<section class="page-banner">
  <div class="page-banner-img">
    <div style="background-image: url({{ banner_image }}); background-size: cover; background-position: center; width: 100%; height: {{ banner_height | default: '400px' }};">
    </div>
  </div>
  <div class="wrapper">
    <div class="page-banner-inner">
      {%- if banner_html -%}
        {%- assign banner_html = 'views/' | append: banner_html -%}
        {%- include {{ banner_html }} -%}
      {%- else -%}
        <div class="page-banner-default">
          <h1 class="page-banner-heading">{{ heading | default: page.title | escape }}</h1>
          <h2 class="page-banner-subheading">{{ subheading | default: page.subtitle | escape }}</h2>
        </div>
      {%- endif -%}
    </div>
  </div>
</section>
